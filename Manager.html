<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: 'Segoe UI', sans-serif; background-color: #2D3748; color: white; padding: 20px; }
  .container { max-width: 900px; margin: auto; text-align: center; }
  .card { background: white; border-radius: 15px; padding: 20px; color: #333; margin-top: 20px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #4A5568; color: white; padding: 12px; }
  td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
  .btn { padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 2px; }
  .ok { background: #48BB78; color: white; }
  .no { background: #F56565; color: white; }
  .logo { max-height: 60px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="container">
  <img src="https://drive.google.com/thumbnail?sz=w1000&id=132VjMWMruovtetRSIyKSioIgidcAVx52" class="logo">
  <h1>لوحة اعتمادات المدير المباشر 📁</h1>
  <div class="card" id="content">جاري تحميل الطلبات...</div>
</div>

<script>
  window.onload = loadData;
  function loadData() {
    google.script.run.withSuccessHandler(data => {
      if (data.length == 0) { document.getElementById('content').innerHTML = "✨ لا توجد طلبات معلقة."; return; }
      let html = '<table><tr><th>الموظف</th><th>النوع</th><th>التاريخ</th><th>المرفق</th><th>القرار</th></tr>';
      data.forEach(r => {
        html += `<tr><td><b>${r.name}</b><br><small>${r.empId}</small></td><td>${r.type}</td><td>${r.from} إلى ${r.to}</td>
        <td>${r.file !== "لا يوجد مرفق" ? `<a href="${r.file}" target="_blank">📄 عرض</a>` : '---'}</td>
        <td><button class="btn ok" onclick="decide(${r.rowNum}, 'Approved')">قبول</button>
            <button class="btn no" onclick="decide(${r.rowNum}, 'Rejected')">رفض</button></td></tr>`;
      });
      document.getElementById('content').innerHTML = html + '</table>';
    }).getPendingRequests();
  }
  function decide(num, status) {
    if (confirm("هل أنت متأكد؟")) {
      document.getElementById('content').innerHTML = "جاري التحديث... ⏳";
      google.script.run.withSuccessHandler(res => { alert(res); loadData(); }).finalizeRequest(num, status);
    }
  }
</script>
</body>
</html>
